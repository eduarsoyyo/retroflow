---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: revelio
  labels:
    app: revelio
spec:
  replicas: 2
  selector:
    matchLabels:
      app: revelio
  template:
    metadata:
      labels:
        app: revelio
    spec:
      containers:
        - name: revelio
          image: revelio:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: revelio
spec:
  type: ClusterIP
  selector:
    app: revelio
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: revelio
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: revelio.alten.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: revelio
                port:
                  number: 80
