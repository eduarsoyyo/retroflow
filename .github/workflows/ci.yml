name: CI
on:
  push:
    branches: [v2, main]
  pull_request:
    branches: [v2, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Tests
        run: npx vitest run
      - name: Build
        run: npx vite build
